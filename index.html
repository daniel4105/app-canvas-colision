<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Simulaciones Canvas</title>

  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h1>Simulaciones Canvas</h1>
    <span>Daniel Alonso</span>
  </nav>

  <!-- CONTROLES -->
  <div class="controls glass">
    <label>Círculos: <span id="valueCircles">8</span></label>

    <input type="range" id="rangeCircles" min="1" max="30" value="8">
    <input type="number" id="inputCircles" min="1" max="30" value="8">
  </div>

  <!-- CONTENEDOR -->
  <div class="container">

    <div class="card glass">
      <h2>Movimiento</h2>
      <canvas id="canvasMove"></canvas>
    </div>

    <div class="card glass">
      <h2>Colisión</h2>
      <canvas id="canvasCollision"></canvas>
    </div>

    <div class="card glass">
      <h2>Rebote</h2>
      <canvas id="canvasBounce"></canvas>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer glass">
    <p>Desarrollado por Daniel Alonso</p>
    <p>Materia: Simulación / Programación</p>
  </footer>

  <script src="./assets/js/main.js"></script>
  <script src="./assets/js/main_colision.js"></script>
  <script src="./assets/js/main_rebote.js"></script>

</body>
</html>
